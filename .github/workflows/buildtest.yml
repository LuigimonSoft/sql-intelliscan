name: Build and Test
on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install system dependencies
        run: |
          echo "deb http://gb.archive.ubuntu.com/ubuntu jammy main" | sudo tee /etc/apt/sources.list.d/jammy.list
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
          build-essential \
          curl \
          wget \
          file \
          unzip \
          libxdo-dev \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libsoup-3.0-dev \
          libjavascriptcoregtk-4.1-dev
      - name: Install Tauri
        run: cargo install create-tauri-app --locked
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked
      - name: Test
        run: cargo test 
      - name: Frontend wasm tests
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/sql-intelliscan-wasm-target
        run: bash ./scripts/wasm-test-local.sh
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Backend coverage
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --no-report --test backend
          cargo llvm-cov --workspace --no-report --test backend_contracts
          cargo llvm-cov --workspace --no-run --json > backend-coverage.json
          python3 - <<'PY'
          import json
          import pathlib
          import sys

          report = json.loads(pathlib.Path("backend-coverage.json").read_text())
          files = report["data"][0]["files"]
          backend_root = pathlib.Path("src-tauri/src").resolve()

          backend_files = []
          for file in files:
              file_path = pathlib.Path(file["filename"]).resolve()
              if backend_root in file_path.parents:
                  backend_files.append(file)

          if not backend_files:
              print("Backend coverage files were not found in llvm-cov output.", file=sys.stderr)
              sys.exit(1)

          total_count = sum(file["summary"]["lines"]["count"] for file in backend_files)
          total_covered = sum(file["summary"]["lines"]["covered"] for file in backend_files)
          coverage = (total_covered / total_count) * 100 if total_count else 0.0

          print("Backend coverage files:")
          for file in sorted(backend_files, key=lambda item: item["filename"]):
              summary = file["summary"]["lines"]
              print(
                  f"- {file['filename']}: {summary['percent']:.2f}% "
                  f"({summary['covered']}/{summary['count']} lines)"
              )

          print(f"Backend line coverage: {coverage:.2f}%")

          if coverage < 80.0:
              print("Backend coverage is below the required 80%.", file=sys.stderr)
              sys.exit(1)
          PY
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Frontend coverage
        run: cargo tarpaulin -p sql-intelliscan-ui --exclude-files 'src-tauri/*' --exclude-files 'src/main.rs' --out Stdout --fail-under 80
