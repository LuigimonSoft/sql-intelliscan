name: Build and Test
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: /tmp/sql-intelliscan-target
      CARGO_LLVM_COV_TARGET_DIR: /tmp/sql-intelliscan-llvm-cov-target
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install system dependencies
        run: |
          echo "deb http://gb.archive.ubuntu.com/ubuntu jammy main" | sudo tee /etc/apt/sources.list.d/jammy.list
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
          build-essential \
          curl \
          wget \
          file \
          unzip \
          libxdo-dev \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libsoup-3.0-dev \
          libjavascriptcoregtk-4.1-dev
      - name: Install Tauri
        run: cargo install create-tauri-app --locked
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked
      - name: Build tests once (without running)
        run: cargo test --workspace --no-run
      - name: Test
        run: cargo test --workspace
      - name: Crate layer tests
        run: |
          cargo test -p sql-intelliscan-common
          cargo test -p sql-intelliscan-repository
          cargo test -p sql-intelliscan-services
      - name: Frontend wasm tests
        env:
          CARGO_TARGET_DIR: /tmp/sql-intelliscan-wasm-target
        run: bash ./scripts/wasm-test-local.sh
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Frontend coverage
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --no-clean --no-report --lib --test frontend
          cargo llvm-cov --workspace --no-clean --no-run --json > frontend-coverage.json
          python3 ./scripts/check-coverage.py \
            --report frontend-coverage.json \
            --root src \
            --exclude src/main.rs \
            --label Frontend \
            --min 80
      - name: Backend coverage
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --no-clean --no-report --test backend_contracts
          cargo llvm-cov --workspace --no-clean --no-run --json > backend-coverage.json
          python3 ./scripts/check-coverage.py \
            --report backend-coverage.json \
            --root src-tauri/src \
            --exclude src-tauri/src/main.rs \
            --label Backend \
            --min 80
      - name: Crate layer coverage
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov -p sql-intelliscan-common --no-clean --no-report
          cargo llvm-cov -p sql-intelliscan-common --no-clean --no-run --json > common-coverage.json
          python3 ./scripts/check-coverage.py \
            --report common-coverage.json \
            --root crates/sql-intelliscan-common/src \
            --label Common \
            --min 80

          cargo llvm-cov clean --workspace
          cargo llvm-cov -p sql-intelliscan-repository --no-clean --no-report
          cargo llvm-cov -p sql-intelliscan-repository --no-clean --no-run --json > repository-coverage.json
          python3 ./scripts/check-coverage.py \
            --report repository-coverage.json \
            --root crates/sql-intelliscan-repository/src \
            --label Repository \
            --min 80

          cargo llvm-cov clean --workspace
          cargo llvm-cov -p sql-intelliscan-services --no-clean --no-report
          cargo llvm-cov -p sql-intelliscan-services --no-clean --no-run --json > services-coverage.json
          python3 ./scripts/check-coverage.py \
            --report services-coverage.json \
            --root crates/sql-intelliscan-services/src \
            --label Services \
            --min 80

  real_test:
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: "YourStrong!Passw0rd"
          MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
          ACCEPT_EULA: "Y"
        ports:
          - 1433:1433
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: llvm-tools-preview
      - name: Wait for MSSQL
        run: |
          for i in {1..30}; do
            if docker run --rm --network host mcr.microsoft.com/mssql-tools \
              /opt/mssql-tools/bin/sqlcmd \
                -S localhost,1433 \
                -U sa \
                -P "YourStrong!Passw0rd" \
                -C \
                -Q "SELECT 1" \
                -b \
                -l 5; then
              echo "MSSQL is ready"
              exit 0
            fi
            echo "Waiting for MSSQL..."
            sleep 10
          done
          echo "MSSQL did not become ready in time" >&2
          exit 1
      - name: Create real test database fixtures
        run: |
          docker run --rm --network host \
            -v "$PWD/scripts/sql-server:/scripts:ro" \
            mcr.microsoft.com/mssql-tools \
            /opt/mssql-tools/bin/sqlcmd \
              -S localhost,1433 \
              -U sa \
              -P "YourStrong!Passw0rd" \
              -C \
              -i /scripts/real-test-setup.sql
      - name: Real SQL Server connection test
        env:
          SQLSERVER_TEST_CONNECTION_STRING: "Server=localhost,1433;User Id=sa;Password=YourStrong!Passw0rd;Database=master;TrustServerCertificate=true;"
        run: |
          cargo test -p sql-intelliscan-repository --test integration_sql_server -- --ignored --exact GivenConfiguredSqlServer_WhenConnectionValidationRuns_ThenRepository_ShouldReturnTrue
      - name: Real SQL Server scalar test
        env:
          SQLSERVER_TEST_CONNECTION_STRING: "Server=localhost,1433;User Id=sa;Password=YourStrong!Passw0rd;Database=master;TrustServerCertificate=true;"
        run: |
          cargo test -p sql-intelliscan-repository sql_server::connection_repository::tests::GivenRealSqlServerTable_WhenScalarIsRequested_ThenClient_ShouldReturnSeededCount -- --ignored --exact
